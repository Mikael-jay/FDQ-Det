<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HDU-Det Demo UI</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <main class="layout">
        <section class="panel controls">
            <h1>HDU-Detect Demo</h1>
            <p class="hint">独立演示界面，可扩展多模型注册。</p>

            <div class="field">
                <label for="imageInput">1、选择目标图片</label>
                <input id="imageInput" type="file" accept="image/*" multiple />
                <small id="selectedCount" class="smallHint">当前未选择图片</small>
            </div>

            <div class="field">
                <label for="modelSelect">2、选择模型权重</label>
                <select id="modelSelect"></select>
                <small id="modelTemplateHint" class="smallHint">模型参数模板将自动填充</small>
            </div>

            <details class="advanced">
                <summary>高级选项（可选）</summary>
                <div class="field">
                    <label for="customCheckpoint">自定义 checkpoint 路径</label>
                    <input id="customCheckpoint" type="text" placeholder="例如: pt/FDQ_Det_AITODv2_best321.pth" />
                </div>
                <div class="field">
                    <label for="customConfig">自定义 config 路径</label>
                    <input id="customConfig" type="text" placeholder="例如: config/fdqdet_aitod.py" />
                </div>
                <div class="grid2">
                    <div class="field">
                        <label for="confThresh">conf_thresh</label>
                        <input id="confThresh" type="number" step="0.01" min="0" max="1" value="0.55" />
                    </div>
                    <div class="field">
                        <label for="nmsIouThresh">nms_iou_thresh</label>
                        <input id="nmsIouThresh" type="number" step="0.01" min="0" max="1" value="0.5" />
                    </div>
                </div>
            </details>

            <button id="predictBtn" class="action">开始检测</button>
            <pre id="status" class="status">等待操作</pre>

            <div class="resultMeta">
                <h3>结果列表</h3>
                <ul id="resultList" class="resultList"></ul>
            </div>
        </section>

        <section class="panel result">
            <div class="viewer">
                <h2>原图</h2>
                <img id="originalImage" alt="原图预览" />
            </div>
            <div id="splitter" class="splitter" title="拖动调整查看比例" role="separator" aria-orientation="vertical"></div>
            <div class="viewer">
                <h2>识别结果</h2>
                <img id="resultImage" alt="识别结果" />
            </div>
            <div class="pager">
                <button id="prevBtn" type="button">上一张</button>
                <span id="pageInfo">0 / 0</span>
                <button id="nextBtn" type="button">下一张</button>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
